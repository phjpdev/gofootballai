services:
  postgres:
    image: postgres:16
    container_name: gofootball-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gofootball_ai
    ports:
      - "5432:5432"
    volumes:
      - gofootball_pg_data:/var/lib/postgresql/data

volumes:
  gofootball_pg_data:
